name: keepalive

# GitHub auto-disables scheduled workflows after 60 days without repo activity.
# This commits a tiny heartbeat file every few weeks so the scan schedule never
# gets disabled — no attention required.
on:
  schedule:
    - cron: "0 6 1,15 * *"   # 1st & 15th of each month
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Touch heartbeat
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/last_keepalive.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/last_keepalive.txt
          git commit -m "chore: keepalive heartbeat" || exit 0
          git push
