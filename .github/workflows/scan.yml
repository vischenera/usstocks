name: scan

# Self-driving market scan. Runs daily after the US close and on manual trigger.
# The worker is a state machine: it backfills first (resuming if interrupted),
# then switches to daily incremental updates automatically.
on:
  schedule:
    # 22:00 UTC ≈ shortly after the US market close. Runs every day.
    - cron: "0 22 * * *"
  workflow_dispatch: {}   # manual "Run workflow" button (use during initial backfill)

concurrency:
  group: scan
  cancel-in-progress: false   # never interrupt an in-flight scan

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # well under the 6h hard cap; covers a full backfill
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: worker/requirements.txt

      - name: Install dependencies
        run: pip install -r worker/requirements.txt

      - name: Run scan
        working-directory: worker
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python run.py
